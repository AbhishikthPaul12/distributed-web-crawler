services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: aethersearch-elasticsearch
    hostname: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend-api:
    build:
      context: ./Distributed-Web-Crawler
      dockerfile: backend/Dockerfile
    container_name: aethersearch-backend
    environment:
      - ES_HOST=http://elasticsearch:9200
    ports:
      - "5000:5000"
    depends_on:
      elasticsearch:
        condition: service_healthy

  frontend-client:
    build:
      context: ./Distributed-Web-Crawler/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:5000
    container_name: aethersearch-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend-api

volumes:
  es_data:
    driver: local
