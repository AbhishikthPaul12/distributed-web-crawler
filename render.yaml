# Render Blueprint (100% free tier)
# Deploy: https://dashboard.render.com/select-repo?type=blueprint
# Shareable app URL: https://aethersearch.onrender.com
#
# Before deploying, create a free Elasticsearch cluster at https://bonsai.io
# and paste its connection URL when Render prompts for ES_HOST.

services:
  # Flask search API (Render free tier)
  - type: web
    name: aethersearch-api
    runtime: docker
    plan: free
    dockerfilePath: ./Distributed-Web-Crawler/backend/Dockerfile
    dockerContext: ./Distributed-Web-Crawler
    healthCheckPath: /
    envVars:
      - key: ES_HOST
        sync: false # Paste your Bonsai cluster URL here during setup
      - key: WEB_CONCURRENCY
        value: "1"

  # React frontend (Render static site — always free)
  - type: web
    name: aethersearch
    runtime: static
    rootDir: Distributed-Web-Crawler/frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://aethersearch-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
